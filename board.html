<section class="blackbook-rotator" aria-label="Blackbook Market Error Display">
  <div class="bb-header">
    <p class="bb-kicker">BLACKBOOK PROOF WINDOW</p>
    <h2>Market Gaps Consensus Has Not Priced Yet</h2>
    <p class="bb-subcopy">One validated entry loads per visit. Browse the full proof stack below.</p>
  </div>

  <div class="bb-card" id="blackbookCard"></div>

  <div class="bb-controls">
    <button class="bb-arrow" id="bbPrev" aria-label="Previous Blackbook entry">←</button>
    <span class="bb-indicator" id="bbIndicator">1 of 3</span>
    <button class="bb-arrow" id="bbNext" aria-label="Next Blackbook entry">→</button>
  </div>
</section>

<style>
  .blackbook-rotator {
    width: 100%;
    margin: 48px auto;
    padding: 32px;
    border: 1px solid rgba(0,255,160,.35);
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(5,15,12,.98), rgba(0,0,0,.96));
    color: #e8fff6;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    box-shadow: 0 0 30px rgba(0,255,160,.08);
  }

  .bb-kicker {
    color: #00ffa0;
    letter-spacing: .12em;
    font-size: .78rem;
    margin-bottom: 8px;
  }

  .bb-header h2 {
    margin: 0 0 8px;
    font-size: clamp(1.4rem, 3vw, 2.1rem);
  }

  .bb-subcopy {
    color: #a8cfc0;
    margin-bottom: 28px;
  }

  .bb-card {
    border-top: 1px solid rgba(0,255,160,.25);
    padding-top: 24px;
  }

  .bb-player {
    color: #fff;
    font-size: 1.5rem;
    margin-bottom: 18px;
  }

  .bb-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .bb-panel {
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 14px;
    padding: 18px;
    background: rgba(255,255,255,.035);
  }

  .bb-panel h3 {
    color: #00ffa0;
    font-size: .85rem;
    letter-spacing: .08em;
    margin: 0 0 12px;
  }

  .bb-panel p {
    margin: 7px 0;
    color: #d8eee6;
    line-height: 1.45;
  }

  .bb-confidence {
    margin-top: 20px;
    padding: 14px 18px;
    border-left: 4px solid #00ffa0;
    background: rgba(0,255,160,.08);
  }

  .bb-cta {
    display: inline-block;
    margin-top: 22px;
    padding: 13px 18px;
    border-radius: 999px;
    background: #00ffa0;
    color: #00110b;
    text-decoration: none;
    font-weight: 800;
  }

  .bb-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin-top: 26px;
  }

  .bb-arrow {
    border: 1px solid rgba(0,255,160,.45);
    background: transparent;
    color: #00ffa0;
    border-radius: 999px;
    width: 42px;
    height: 42px;
    cursor: pointer;
    font-size: 1.1rem;
  }

  .bb-indicator {
    color: #a8cfc0;
    font-size: .9rem;
  }

  @media (max-width: 760px) {
    .blackbook-rotator {
      padding: 22px;
    }

    .bb-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<script>
  const blackbookEntries = [
    {
      player: "JADARIAN PRICE",
      market: "Post-draft committee back; limited upside",
      situation: "New OC + 60% vacated Seattle touches",
      volume: "Offensive pace supports sustained snaps",
      role: "Designated volume anchor in new scheme",
      marketSees: "RB3 in committee",
      trueVolumeSees: "Volume anchor in new scheme",
      driver: "Market has not updated on OC change + vacancy created",
      consensusRight: "Mid-round RB value",
      trueVolumeRight: "RB12 production path",
      confidence: "HIGH"
    },
    {
      player: "CARNELL TATE",
      market: "Raw #2 behind Ridley; WR4 ADP",
      situation: "#4 OVR pick + Cam Ward chemistry locked",
      volume: "Daboll scheme creates heavy 3-WR usage",
      role: "Designated WR1 alpha deployment path",
      marketSees: "Prospect depth chart",
      trueVolumeSees: "WR1 floor from capital + scheme fit",
      driver: "Market prices him as wait-and-see; scheme + capital = WR1 path",
      consensusRight: "WR3 value, slow development",
      trueVolumeRight: "WR18 ceiling, immediate relevance",
      confidence: "HIGH"
    },
    {
      player: "DE'VON ACHANE",
      market: "Unstoppable volume anchor; RB6 / 14th overall",
      situation: "Willis era begins; goal-line vulture added through QB rushes",
      volume: "Ollie Gordon II cannibalizes high-impact touches",
      role: "Snap share throttled to preserve frame; TD ceiling capped",
      marketSees: "2025 snap share carries forward as baseline",
      trueVolumeSees: "Situation decay + backfield crowding suppress ceiling",
      driver: "Touchdown vultures + situation decay = RB2 ceiling, not RB1",
      consensusRight: "Tier 1 anchor worth mid-1st round",
      trueVolumeRight: "Volatile RB2 ceiling busts at current ADP",
      confidence: "HIGH"
    }
  ];

  let currentEntry = Number(localStorage.getItem("blackbookEntryIndex")) || 0;

  function renderBlackbookEntry(index) {
    const entry = blackbookEntries[index];

    document.getElementById("blackbookCard").innerHTML = `
      <div class="bb-player">${entry.player}</div>

      <div class="bb-grid">
        <div class="bb-panel">
          <h3>MARKET NARRATIVE</h3>
          <p>${entry.market}</p>
        </div>

        <div class="bb-panel">
          <h3>MECHANICAL TRUTH</h3>
          <p><strong>Situation:</strong> ${entry.situation}</p>
          <p><strong>Volume:</strong> ${entry.volume}</p>
          <p><strong>Role:</strong> ${entry.role}</p>
        </div>

        <div class="bb-panel">
          <h3>THE GAP</h3>
          <p><strong>Market sees:</strong> ${entry.marketSees}</p>
          <p><strong>TrueVolume™ sees:</strong> ${entry.trueVolumeSees}</p>
          <p><strong>Driver:</strong> ${entry.driver}</p>
        </div>

        <div class="bb-panel">
          <h3>CONSEQUENCE</h3>
          <p><strong>If consensus right:</strong> ${entry.consensusRight}</p>
          <p><strong>If TrueVolume™ right:</strong> ${entry.trueVolumeRight}</p>
        </div>
      </div>

      <div class="bb-confidence">
        CONFIDENCE LEVEL: ${entry.confidence}
      </div>

      <a class="bb-cta" href="/war-room">Unlock War Room</a>
    `;

    document.getElementById("bbIndicator").textContent = `${index + 1} of ${blackbookEntries.length}`;
    localStorage.setItem("blackbookEntryIndex", String((index + 1) % blackbookEntries.length));
  }

  document.getElementById("bbPrev").addEventListener("click", () => {
    currentEntry = (currentEntry - 1 + blackbookEntries.length) % blackbookEntries.length;
    renderBlackbookEntry(currentEntry);
  });

  document.getElementById("bbNext").addEventListener("click", () => {
    currentEntry = (currentEntry + 1) % blackbookEntries.length;
    renderBlackbookEntry(currentEntry);
  });

  renderBlackbookEntry(currentEntry);

  setInterval(() => {
    currentEntry = (currentEntry + 1) % blackbookEntries.length;
    renderBlackbookEntry(currentEntry);
  }, 30000);
</script>
